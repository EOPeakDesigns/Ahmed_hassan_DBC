<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta Tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ahmed Hassan - Professional Tour Guide. Contact for guided tours and travel experiences.">
  <meta name="keywords" content="tour guide, Egypt, travel, guided tours, Ahmed Hassan">
  <meta name="author" content="Ahmed Hassan">
  
  <!-- Page Title -->
  <title>Ahmed Hassan - Tour Guide</title>
  
  <!-- External Dependencies -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" 
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" 
        crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap">
  
  <!-- Modular Stylesheets -->
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <!-- Main Application Container -->
  <main class="card-container">
    <div class="business-card">
      <!-- Background Texture Layer -->
      <div class="bg-texture" aria-hidden="true"></div>
      
      <!-- Card Header Component -->
      <header class="card-header">
        <div class="profile-img-container">
          <img src="https://images.unsplash.com/photo-1604419290884-45cb8b67c2ca?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3NjkwMjR8MHwxfHNlYXJjaHw0OHx8QWhtZWQlMjBIYXNzYW58ZW58MHx8fHwxNzU5NzQ2ODUwfDA&ixlib=rb-4.1.0&q=80&w=1080" 
               alt="Ahmed Hassan - Professional Tour Guide" 
               class="profile-image">
        </div>
        <h1>AHMED HASSAN</h1>
        <h2>TOUR GUIDE</h2>
      </header>
      
      <!-- Visual Divider -->
      <div class="divider" aria-hidden="true"></div>
      
      <!-- Card Content Component -->
      <div class="card-content">
        <!-- Contact Information Section -->
        <section class="contact-section" aria-labelledby="contact-heading">
          <h3 id="contact-heading" class="sr-only">Contact Information</h3>
          
          <div class="contact-item">
            <i class="fab fa-whatsapp" style="color: #25D366;" aria-hidden="true"></i>
            <span data-copy="+20 10123 XXXX" role="button" tabindex="0" 
                  aria-label="Copy phone number to clipboard">
              +20 10123 XXXX
            </span>
            <div class="tooltip" role="status" aria-live="polite">Copied to clipboard!</div>
          </div>
          
          <div class="contact-item">
            <i class="fas fa-envelope" style="color: #D93025;" aria-hidden="true"></i>
            <span data-copy="contact@gmail.com" role="button" tabindex="0" 
                  aria-label="Copy email address to clipboard">
              contact@gmail.com
            </span>
            <div class="tooltip" role="status" aria-live="polite">Copied to clipboard!</div>
          </div>
          
          <div class="contact-item">
            <i class="fas fa-globe" aria-hidden="true"></i>
            <span data-copy="www.website.com" role="button" tabindex="0" 
                  aria-label="Copy website URL to clipboard">
              www.website.com
            </span>
            <div class="tooltip" role="status" aria-live="polite">Copied to clipboard!</div>
          </div>
        </section>
        
        <!-- Social Media Section -->
        <section class="social-section" aria-labelledby="social-heading">
          <h3 id="social-heading" class="sr-only">Social Media Links</h3>
          <div class="social-icons">
            <a href="javascript:void(0)" 
               class="social-icon" 
               aria-label="Visit Facebook page"
               title="Facebook">
              <i class="fab fa-facebook-f" aria-hidden="true"></i>
            </a>
            <a href="javascript:void(0)" 
               class="social-icon" 
               aria-label="Visit Instagram profile"
               title="Instagram">
              <i class="fab fa-instagram" aria-hidden="true"></i>
            </a>
            <a href="javascript:void(0)" 
               class="social-icon" 
               aria-label="Visit LinkedIn profile"
               title="LinkedIn">
              <i class="fab fa-linkedin-in" aria-hidden="true"></i>
            </a>
            <a href="javascript:void(0)" 
               class="social-icon" 
               aria-label="Visit Twitter profile"
               title="Twitter">
              <i class="fab fa-twitter" aria-hidden="true"></i>
            </a>
            <button class="social-icon qr-icon" 
                    aria-label="Show QR Code" 
                    title="Display QR Code">
              <i class="fas fa-qrcode" aria-hidden="true"></i>
            </button>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- QR Code Modal Component -->
  <div class="modal-overlay" 
       aria-hidden="true" 
       role="dialog" 
       aria-modal="true" 
       aria-labelledby="qr-modal-title">
    <div class="qr-modal">
      <button class="modal-close" 
              aria-label="Close QR Code modal"
              title="Close">
        <span aria-hidden="true">&times;</span>
      </button>
      <h3 id="qr-modal-title">My QR Code</h3>
      <img src="https://images.unsplash.com/photo-1595079834934-b78552e04b10?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3NjkwMjR8MHwxfHNlYXJjaHwyMXx8UVIlMjBDb2RlfGVufDB8fHx8MTc1OTc0MjkwNXww&ixlib=rb-4.1.0&q=80&w=1080" 
           alt="QR Code for Ahmed Hassan's contact information" 
           class="modal-qr-image">
      <button class="download-btn" 
              aria-label="Download QR Code image"
              title="Download QR Code">
        Download QR Code
      </button>
    </div>
  </div>

  <!-- Modular JavaScript -->
  <script src="scripts/clipboard-manager.js"></script>
  <script src="scripts/modal-manager.js"></script>
  <script src="scripts/social-interactions.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
