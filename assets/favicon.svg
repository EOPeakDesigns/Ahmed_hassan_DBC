<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background Circle with Egyptian Theme -->
  <!-- Radius adjusted to 15.5 to account for stroke-width 1 (15.5 + 0.5 = 16, perfect fit) -->
  <circle cx="16" cy="16" r="15.5" fill="#DCC184" stroke="#4A2E18" stroke-width="1"/>
  
  <!-- Egyptian-inspired Border Pattern -->
  <!-- Radius adjusted to 13.5 to account for stroke-width 0.5 (13.5 + 0.25 = 13.75, maintains visual relationship) -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#C99A59" stroke-width="0.5" opacity="0.7"/>
  
  <!-- Owner Initials: A.H. -->
  <text x="16" y="22" 
        font-family="Cinzel, serif" 
        font-size="14" 
        font-weight="700" 
        text-anchor="middle" 
        fill="#4A2E18" 
        letter-spacing="1px">
    A.H.
  </text>
  
  <!-- Egyptian Accent Elements -->
  <circle cx="8" cy="8" r="1" fill="#D4AF37" opacity="0.6"/>
  <circle cx="24" cy="8" r="1" fill="#D4AF37" opacity="0.6"/>
  <circle cx="8" cy="24" r="1" fill="#D4AF37" opacity="0.6"/>
  <circle cx="24" cy="24" r="1" fill="#D4AF37" opacity="0.6"/>
  
  <!-- Central Egyptian Symbol -->
  <path d="M16 6 L18 10 L16 12 L14 10 Z" fill="#C99A59" opacity="0.8"/>
  <path d="M16 20 L18 24 L16 26 L14 24 Z" fill="#C99A59" opacity="0.8"/>
</svg>
