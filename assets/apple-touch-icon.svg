<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background with Egyptian Theme -->
  <rect width="180" height="180" rx="20" ry="20" fill="#DCC184" stroke="#4A2E18" stroke-width="2"/>
  
  <!-- Egyptian-inspired Border Pattern -->
  <rect x="10" y="10" width="160" height="160" rx="15" ry="15" fill="none" stroke="#C99A59" stroke-width="1" opacity="0.7"/>
  
  <!-- Owner Initials: A.H. - Large and Prominent -->
  <text x="90" y="115" 
        font-family="Cinzel, serif" 
        font-size="48" 
        font-weight="700" 
        text-anchor="middle" 
        fill="#4A2E18" 
        letter-spacing="3px">
    A.H.
  </text>
  
  <!-- Egyptian Accent Elements - Larger for Apple Touch -->
  <circle cx="30" cy="30" r="4" fill="#D4AF37" opacity="0.6"/>
  <circle cx="150" cy="30" r="4" fill="#D4AF37" opacity="0.6"/>
  <circle cx="30" cy="150" r="4" fill="#D4AF37" opacity="0.6"/>
  <circle cx="150" cy="150" r="4" fill="#D4AF37" opacity="0.6"/>
  
  <!-- Central Egyptian Symbol - Larger -->
  <path d="M90 20 L100 35 L90 45 L80 35 Z" fill="#C99A59" opacity="0.8"/>
  <path d="M90 135 L100 150 L90 160 L80 150 Z" fill="#C99A59" opacity="0.8"/>
  
  <!-- Additional Egyptian Ornamentation -->
  <path d="M45 90 L55 100 L45 110 L35 100 Z" fill="#D4AF37" opacity="0.5"/>
  <path d="M135 90 L145 100 L135 110 L125 100 Z" fill="#D4AF37" opacity="0.5"/>
</svg>
