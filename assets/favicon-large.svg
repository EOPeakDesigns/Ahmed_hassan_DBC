<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background Circle with Egyptian Theme - Scaled 16x from 32x32 to 512x512 -->
  <!-- Radius adjusted to 248 to account for stroke-width 16 (248 + 8 = 256, perfect fit) -->
  <circle cx="256" cy="256" r="248" fill="#DCC184" stroke="#4A2E18" stroke-width="16"/>
  
  <!-- Egyptian-inspired Border Pattern -->
  <!-- Radius adjusted to 220 to account for stroke-width 8 (220 + 4 = 224, maintains visual relationship) -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#C99A59" stroke-width="8" opacity="0.7"/>
  
  <!-- Owner Initials: A.H. - Scaled proportionally -->
  <text x="256" y="352" 
        font-family="Cinzel, serif" 
        font-size="224" 
        font-weight="700" 
        text-anchor="middle" 
        fill="#4A2E18" 
        letter-spacing="16px">
    A.H.
  </text>
  
  <!-- Egyptian Accent Elements - Scaled proportionally -->
  <circle cx="128" cy="128" r="16" fill="#D4AF37" opacity="0.6"/>
  <circle cx="384" cy="128" r="16" fill="#D4AF37" opacity="0.6"/>
  <circle cx="128" cy="384" r="16" fill="#D4AF37" opacity="0.6"/>
  <circle cx="384" cy="384" r="16" fill="#D4AF37" opacity="0.6"/>
  
  <!-- Central Egyptian Symbol - Scaled proportionally -->
  <path d="M256 96 L288 160 L256 192 L224 160 Z" fill="#C99A59" opacity="0.8"/>
  <path d="M256 320 L288 384 L256 416 L224 384 Z" fill="#C99A59" opacity="0.8"/>
</svg>

